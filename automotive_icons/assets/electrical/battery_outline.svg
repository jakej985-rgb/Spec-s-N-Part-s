<svg 
  viewBox="0 0 24 24" 
  xmlns="http://www.w3.org/2000/svg"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <!-- Battery main body -->
  <rect x="5" y="7" width="14" height="10" rx="2" ry="2"/>
  <!-- Battery terminal nub (positive) -->
  <rect x="10" y="4.5" width="4" height="2.5" rx="0.5" ry="0.5"/>
  <!-- Charge level indicator (80% full) -->
  <rect x="7" y="10" width="10" height="5" rx="1" ry="1" fill="currentColor" opacity="0.3"/>
  <!-- Charge bars (3 segments showing 80%) -->
  <line x1="8" y1="9.5" x2="8" y2="15.5" stroke-width="0.8" opacity="0.6"/>
  <line x1="11" y1="9.5" x2="11" y2="15.5" stroke-width="0.8" opacity="0.6"/>
  <line x1="14" y1="9.5" x2="14" y2="15.5" stroke-width="0.8" opacity="0.6"/>
  <line x1="17" y1="9.5" x2="17" y2="15.5" stroke-width="0.8" opacity="0.3"/>
  <!-- Plus/minus terminals (simplified) -->
  <circle cx="8" cy="17.5" r="0.4" fill="currentColor"/>
  <circle cx="16" cy="17.5" r="0.4" fill="currentColor"/>
</svg>
