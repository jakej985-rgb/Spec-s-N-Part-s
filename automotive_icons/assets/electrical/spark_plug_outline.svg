<svg 
  viewBox="0 0 24 24" 
  xmlns="http://www.w3.org/2000/svg"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <!-- Spark plug body (ceramic insulator) -->
  <path d="M 9 3 L 9 8 Q 9 9 10 9 L 14 9 Q 15 9 15 8 L 15 3" fill="currentColor" opacity="0.15"/>
  <!-- Insulator outline -->
  <line x1="9" y1="3" x2="9" y2="8"/>
  <line x1="15" y1="3" x2="15" y2="8"/>
  <path d="M 9 8 Q 9 9 10 9 L 14 9 Q 15 9 15 8"/>
  <!-- Ground electrode (bottom) -->
  <path d="M 10 9 L 8 16 Q 7.5 17 8 17.5 Q 8.5 18 9 17.5"/>
  <circle cx="9" cy="17.5" r="0.4" fill="currentColor"/>
  <!-- Center electrode (bent, showing gap) -->
  <path d="M 14 9 L 16 16 Q 16.5 17 16 17.5"/>
  <circle cx="16" cy="17.5" r="0.4" fill="currentColor"/>
  <!-- Spark gap indication -->
  <line x1="9" y1="14" x2="16" y2="14" stroke-width="0.8" opacity="0.5" stroke-dasharray="1,1"/>
  <!-- Hex nut base -->
  <path d="M 11 9 L 10 10.5 L 11 12 L 13 12 L 14 10.5 L 13 9 Z"/>
</svg>
