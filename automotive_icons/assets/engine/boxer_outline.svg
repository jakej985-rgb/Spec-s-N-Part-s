<svg 
  viewBox="0 0 24 24" 
  xmlns="http://www.w3.org/2000/svg"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <!-- Boxer engine layout (flat 4, two on each side) -->
  <!-- Crankshaft center -->
  <line x1="3" y1="12" x2="21" y2="12" stroke-width="1.5" opacity="0.5"/>
  <!-- Left cylinders (top) -->
  <rect x="5" y="5" width="3" height="5" rx="1" ry="1" fill="none" stroke-width="1.5"/>
  <!-- Left cylinders (bottom) -->
  <rect x="5" y="14" width="3" height="5" rx="1" ry="1" fill="none" stroke-width="1.5"/>
  <!-- Right cylinders (top) -->
  <rect x="16" y="5" width="3" height="5" rx="1" ry="1" fill="none" stroke-width="1.5"/>
  <!-- Right cylinders (bottom) -->
  <rect x="16" y="14" width="3" height="5" rx="1" ry="1" fill="none" stroke-width="1.5"/>
  <!-- Pistons (connecting points) -->
  <circle cx="6.5" cy="10" r="0.8" fill="currentColor"/>
  <circle cx="6.5" cy="14" r="0.8" fill="currentColor"/>
  <circle cx="17.5" cy="10" r="0.8" fill="currentColor"/>
  <circle cx="17.5" cy="14" r="0.8" fill="currentColor"/>
  <!-- Connecting rods to center -->
  <line x1="6.5" y1="10" x2="12" y2="12"/>
  <line x1="6.5" y1="14" x2="12" y2="12"/>
  <line x1="17.5" y1="10" x2="12" y2="12"/>
  <line x1="17.5" y1="14" x2="12" y2="12"/>
</svg>
