<svg 
  viewBox="0 0 24 24" 
  xmlns="http://www.w3.org/2000/svg"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <!-- Turbine housing (circular spiral) -->
  <circle cx="12" cy="12" r="7" fill="none"/>
  <!-- Compressor inlet (top) -->
  <path d="M 12 2 L 12 5" stroke-width="2.5"/>
  <!-- Turbine outlet (bottom) -->
  <path d="M 12 22 L 12 19" stroke-width="2.5"/>
  <!-- Spiral turbine blades (3 curved paths) -->
  <path d="M 12 5 Q 15 8 15 12 Q 15 16 12 19" fill="none" stroke-width="1.5" opacity="0.6"/>
  <path d="M 12 5 Q 10 7 8 10" fill="none" stroke-width="1.5" opacity="0.6"/>
  <path d="M 12 19 Q 14 17 16 14" fill="none" stroke-width="1.5" opacity="0.6"/>
  <!-- Center spinner shaft -->
  <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
  <!-- Pressure boost indicator lines -->
  <path d="M 7 10 Q 8 11 7 12" stroke-width="1.5" opacity="0.7"/>
  <path d="M 17 10 Q 16 11 17 12" stroke-width="1.5" opacity="0.7"/>
</svg>
