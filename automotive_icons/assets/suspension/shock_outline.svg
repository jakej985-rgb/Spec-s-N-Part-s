<svg 
  viewBox="0 0 24 24" 
  xmlns="http://www.w3.org/2000/svg"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <!-- Shock outer cylinder -->
  <line x1="10" y1="2" x2="10" y2="22" stroke-width="3" opacity="0.3"/>
  <line x1="14" y1="2" x2="14" y2="22" stroke-width="3" opacity="0.3"/>
  <!-- Piston rod (center) -->
  <line x1="12" y1="3" x2="12" y2="16" stroke-width="2.5"/>
  <!-- Damper piston head -->
  <circle cx="12" cy="16" r="2" fill="currentColor"/>
  <!-- Oil chamber (lower) -->
  <ellipse cx="12" cy="20" rx="2.5" ry="1.5" fill="currentColor" opacity="0.2"/>
  <!-- Rebound spring (top coils) -->
  <path d="M 11 6 Q 9 7 11 8 Q 13 9 11 10" stroke-width="1.2" opacity="0.7"/>
  <path d="M 13 6 Q 15 7 13 8 Q 11 9 13 10" stroke-width="1.2" opacity="0.7"/>
  <!-- Compression chamber marker -->
  <line x1="10.5" y1="12" x2="13.5" y2="12" stroke-width="1" opacity="0.6"/>
</svg>
