<svg 
  viewBox="0 0 24 24" 
  xmlns="http://www.w3.org/2000/svg"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <!-- Truck cabin (left compact box) -->
  <rect x="3" y="10" width="6" height="7" rx="1" ry="1"/>
  <!-- Truck bed (right large box) -->
  <rect x="9" y="11" width="12" height="6" rx="1" ry="1" fill="currentColor" opacity="0.1"/>
  <!-- Cabin windshield -->
  <path d="M 4 10 L 4 6 Q 4 5 5 5 L 8 5 Q 9 5 9 6 L 9 10"/>
  <!-- Cabin window -->
  <line x1="4" y1="6" x2="9" y2="6"/>
  <!-- Truck bed walls -->
  <line x1="9" y1="11" x2="21" y2="11"/>
  <!-- Wheels (larger for truck) -->
  <circle cx="5" cy="17" r="1.8" fill="none" stroke-width="1.5"/>
  <circle cx="19" cy="17" r="1.8" fill="none" stroke-width="1.5"/>
  <!-- Wheel hubs -->
  <circle cx="5" cy="17" r="0.6" fill="currentColor"/>
  <circle cx="19" cy="17" r="0.6" fill="currentColor"/>
  <!-- Dual rear wheels -->
  <circle cx="21" cy="17" r="1.2" fill="none" stroke-width="1"/>
  <circle cx="21" cy="17" r="0.4" fill="currentColor"/>
</svg>
