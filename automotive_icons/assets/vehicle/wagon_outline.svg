  <!-- Side window -->
  <line x1="8" y1="11" x2="8" y2="7"/>
  <line x1="12" y1="11" x2="12" y2="7"/>
  <!-- Wheels -->
  <circle cx="7" cy="19" r="1.5" fill="currentColor"/>
  <circle cx="17" cy="19" r="1.5" fill="currentColor"/>
